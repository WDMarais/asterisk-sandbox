# Installed to /etc/logrotate.d/asterisk (overrides the package default).
# Copied, NOT symlinked: logrotate ignores symlinked configs in logrotate.d.
#
# The Debian asterisk package ships a config whose glob matches `messages`
# (no extension), but this logger.conf writes `messages.log` -- so the stock
# config never rotated it and it grew unbounded until the disk filled (which
# in turn starved astdb and silently broke SIP registration). The *.log glob
# fixes the match; maxsize guards against a fast log flood (e.g. a SIP auth
# retry loop) filling the disk between scheduled runs.
/var/log/asterisk/*.log /var/log/asterisk/*_log {
        weekly
        maxsize 200M
        missingok
        notifempty
        rotate 7
        compress
        delaycompress
        sharedscripts
        postrotate
                /usr/sbin/invoke-rc.d asterisk logger-reload > /dev/null 2> /dev/null
        endscript
}
