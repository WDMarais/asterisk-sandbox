# Fail2Ban filter for Asterisk chan_pjsip failed REGISTER/auth attempts -- SIP
# scanner bots hitting public 5060 with guessed extensions. The banned IP is the
# request *source* ("failed for '<HOST>:port'"), not the From URI (which contains
# this server's own address).
#
# Validate against the live log before trusting it:
#   sudo fail2ban-regex /var/log/asterisk/messages.log /etc/fail2ban/filter.d/asterisk-pjsip.conf
[Definition]
failregex = Request '[A-Z]+' from '[^']*' failed for '<HOST>:\d+' \(callid: [^)]*\) - (No matching endpoint found|Failed to authenticate)
ignoreregex =
datepattern = ^\[%%b %%d %%H:%%M:%%S\]
